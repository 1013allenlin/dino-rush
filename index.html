<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超速方塊 - 全球排行榜版</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        #gameLayout { display: flex; justify-content: center; align-items: flex-start; gap: 30px; max-width: 1200px; margin: 20px auto; flex-wrap: wrap; }
        
        /* 遊戲區域 */
        #gameContainer { width: 800px; position: relative; }
        canvas { background-color: #fff; border-bottom: 4px solid #333; display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-radius: 4px; width: 800px; height: 200px; }
        
        /* 排行榜區域 */
        #leaderboard { 
            width: 280px; background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: left; border-top: 5px solid #e67e22;
        }
        #leaderboard h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; }
        #leaderboardList { min-height: 150px; }
        .score-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 15px; transition: 0.3s; }
        .score-item:hover { background-color: #fff9f4; }
        .score-rank { font-weight: bold; color: #e67e22; width: 25px; display: inline-block; }
        .score-name { color: #34495e; font-weight: 500; }
        .score-val { font-weight: bold; color: #2980b9; }

        /* 狀態資訊 */
        .info { color: #7f8c8d; margin-bottom: 10px; }
        .status { font-weight: bold; color: #e67e22; height: 30px; margin-top: 10px; font-size: 1.1em; }
        .speed-monitor { font-family: 'Courier New', monospace; color: #3498db; font-size: 14px; background: #ebf5fb; display: inline-block; padding: 5px 15px; border-radius: 20px; margin-top: 10px; }
        #scoreDisplay { font-size: 24px; font-weight: bold; color: #2c3e50; margin: 15px 0; }
    </style>
</head>
<body>
    <h2 class="info">按下 [ 空白鍵 ] 開始遊戲 / 跳躍 (可二段跳)</h2>
    
    <div id="gameLayout">
        <div id="gameContainer">
            <canvas id="gameCanvas"></canvas>
            <div id="status" class="status"></div>
            <div id="speedMonitor" class="speed-monitor">準備就緒</div>
            <div id="scoreDisplay">分數: 0</div>
        </div>

        <div id="leaderboard">
            <h3><span>🏆 全球 TOP 10</span></h3>
            <div id="leaderboardList">正在連線至伺服器...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, query, orderByChild, limitToLast } 
        from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyApF4WnrcGhBLFgCLiVCByqy-i_7VnkduI",
            authDomain: "blockrush-d0924.firebaseapp.com",
            databaseURL: "https://blockrush-d0924-default-rtdb.firebaseio.com",
            projectId: "blockrush-d0924",
            storageBucket: "blockrush-d0924.firebasestorage.app",
            messagingSenderId: "645488897630",
            appId: "1:645488897630:web:f867d2c53dd602e299cecf"
        };

        // 初始化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const scoresRef = ref(db, 'leaderboard');

        // 遊戲元件
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const statusElement = document.getElementById('status');
        const speedMonitor = document.getElementById('speedMonitor');
        const leaderboardList = document.getElementById('leaderboardList');

        canvas.width = 800;
        canvas.height = 200;

        const STATE = { WAITING: 0, PLAYING: 1, GAMEOVER: 2 };
        let currentState = STATE.WAITING;

        let score = 0;
        let timer = 0;
        let baseSpeed = 5;
        let gameSpeed = 5;
        let boostTimer = 0;
        const BOOST_MULT = 1.8;

        let obstacles = [];
        let birds = [];
        let items = [];

        const dino = {
            x: 50, y: 150, width: 40, height: 40,
            dy: 0, jumpForce: 10, gravity: 0.5, jumpCount: 0,
            draw() {
                ctx.fillStyle = boostTimer > 0 ? (timer % 10 < 5 ? '#f1c40f' : '#e67e22') : '#555';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            },
            update() {
                this.dy += this.gravity;
                this.y += this.dy;
                if (this.y + this.height >= canvas.height) {
                    this.y = canvas.height - this.height;
                    this.dy = 0;
                    this.jumpCount = 0;
                }
            },
            jump() {
                if (this.jumpCount < 2) {
                    this.dy = -this.jumpForce;
                    this.jumpCount++;
                }
            }
        };

        // --- 排行榜邏輯 ---
        function listenLeaderboard() {
            const topScoresQuery = query(scoresRef, orderByChild('score'), limitToLast(10));
            onValue(topScoresQuery, (snapshot) => {
                const data = snapshot.val();
                let scoreArray = [];
                if (data) {
                    Object.keys(data).forEach(key => scoreArray.push(data[key]));
                    scoreArray.sort((a, b) => b.score - a.score);
                    leaderboardList.innerHTML = scoreArray.map((item, index) => `
                        <div class="score-item">
                            <span><span class="score-rank">${index + 1}</span><span class="score-name">${item.name}</span></span>
                            <span class="score-val">${Math.floor(item.score)}</span>
                        </div>
                    `).join('');
                } else {
                    leaderboardList.innerHTML = "尚未有得分記錄";
                }
            }, (error) => {
                console.error("Firebase 讀取錯誤:", error);
                leaderboardList.innerHTML = "讀取失敗，請檢查 Firebase 規則";
            });
        }

        async function uploadScore(finalScore) {
            const name = prompt("🎉 挑戰結束！你的得分是 " + finalScore + "\n請輸入你的大名：", "玩家" + Math.floor(Math.random()*1000));
            if (name) {
                try {
                    const newScoreRef = push(scoresRef);
                    await set(newScoreRef, {
                        name: name.substring(0, 8),
                        score: finalScore,
                        timestamp: Date.now()
                    });
                } catch (e) {
                    console.error("寫入失敗:", e);
                    alert("上傳失敗，請確認 Firebase Rules 已設為允許讀寫。");
                }
            }
        }

        // --- 遊戲引擎 ---
        function resetGame() {
            score = 0; timer = 0; boostTimer = 0;
            baseSpeed = 5; gameSpeed = 5;
            obstacles = []; birds = []; items = [];
            dino.y = 150; dino.dy = 0; dino.jumpCount = 0;
            statusElement.innerText = "";
        }

        function handleLogic() {
            timer++;
            baseSpeed = 5 + (Math.floor(score / 500) * 0.5);

            if (boostTimer > 0) {
                boostTimer--;
                gameSpeed = baseSpeed * BOOST_MULT;
                statusElement.innerText = "🚀 衝刺模式！無視障礙物 🚀";
            } else {
                gameSpeed = baseSpeed; 
                statusElement.innerText = "";
            }

            speedMonitor.innerText = `基礎速度: ${baseSpeed.toFixed(1)} | 當前速度: ${gameSpeed.toFixed(1)}`;

            if (timer % 110 === 0) obstacles.push({ x: 800, y: 160, width: 25, height: 40 });
            if (timer % 240 === 0) {
                birds.push({ 
                    x: 800, baseY: 80, width: 35, height: 15, 
                    offset: Math.random() * 10,
                    amp: 30 + Math.random() * 40,
                    freq: 0.05 + Math.random() * 0.05
                });
            }
            if (timer % 600 === 0) items.push({ x: 800, y: 60, width: 25, height: 25 });

            // 物件更新
            obstacles.forEach((ob, i) => {
                ob.x -= gameSpeed;
                ctx.fillStyle = '#27ae60';
                ctx.fillRect(ob.x, ob.y, ob.width, ob.height);
                if (checkCollision(dino, ob)) {
                    if (boostTimer > 0) { obstacles.splice(i, 1); score += 100; }
                    else endGame();
                }
            });

            birds.forEach((b, i) => {
                b.x -= (gameSpeed + 1);
                b.y = b.baseY + Math.sin(timer * b.freq + b.offset) * b.amp;
                ctx.fillStyle = '#8e44ad';
                ctx.fillRect(b.x, b.y, b.width, b.height);
                if (checkCollision(dino, b)) endGame();
            });

            items.forEach((it, i) => {
                it.x -= gameSpeed;
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(it.x + 12, it.y + 12, 12, 0, Math.PI * 2);
                ctx.fill();
                if (checkCollision(dino, it)) {
                    items.splice(i, 1);
                    boostTimer = 300;
                }
            });

            obstacles = obstacles.filter(o => o.x > -50);
            birds = birds.filter(b => b.x > -50);
            items = items.filter(it => it.x > -50);

            score += 0.5; 
            scoreDisplay.innerText = `分數: ${Math.floor(score)}`;
        }

        function endGame() {
            currentState = STATE.GAMEOVER;
            uploadScore(Math.floor(score));
        }

        function checkCollision(a, b) {
            return a.x < b.x + b.width && a.x + a.width > b.x &&
                   a.y < b.y + b.height && a.y + a.height > b.y;
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dino.draw();

            if (currentState === STATE.WAITING) {
                ctx.fillStyle = "rgba(0,0,0,0.4)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.font = "24px Arial";
                ctx.fillText("按下 [ 空白鍵 ] 開始挑戰", canvas.width / 2, canvas.height / 2 + 10);
            } else if (currentState === STATE.PLAYING) {
                dino.update();
                handleLogic();
            } else if (currentState === STATE.GAMEOVER) {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.font = "bold 30px Arial";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "20px Arial";
                ctx.fillText(`最終得分: ${Math.floor(score)} | 再按一次空白鍵重玩`, canvas.width / 2, canvas.height / 2 + 30);
            }
            requestAnimationFrame(animate);
        }

        function handleInput() {
            if (currentState !== STATE.PLAYING) {
                resetGame();
                currentState = STATE.PLAYING;
            } else {
                dino.jump();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); handleInput(); }
        });

        // 啟動連線與遊戲
        listenLeaderboard();
        animate();
    </script>
</body>
</html>
