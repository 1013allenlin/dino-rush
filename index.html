<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>超速方塊 - 聯網排行榜版</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .game-layout { display: flex; gap: 20px; justify-content: center; align-items: flex-start; }
        #gameContainer { width: 800px; position: relative; }
        canvas { background-color: #fff; border-bottom: 3px solid #333; display: block; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        /* 排行榜樣式 */
        .leaderboard { width: 250px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .leaderboard h2 { margin-top: 0; font-size: 20px; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        #leaderboard-list { list-style: none; padding: 0; text-align: left; }
        #leaderboard-list li { padding: 8px 0; border-bottom: 1px solid #f9f9f9; display: flex; justify-content: space-between; font-size: 14px; }
        #leaderboard-list li:last-child { border: none; }
        
        .info { color: #555; }
        .status { font-weight: bold; color: #e67e22; height: 24px; margin-top: 10px; }
        .speed-monitor { font-family: monospace; color: #2980b9; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <h2 class="info">按下 [空白鍵/點擊畫面] 開始 / 跳躍</h2>
    
    <div class="game-layout">
        <div id="gameContainer">
            <canvas id="gameCanvas"></canvas>
            <div id="status" class="status"></div>
            <div id="speedMonitor" class="speed-monitor">正常速度: 5.0 | 當前速度: 5.0</div>
            <h3 id="score" class="info">分數: 0</h3>
        </div>

        <div class="leaderboard">
            <h2>🏆 前五名排行</h2>
            <ul id="leaderboard-list">讀取中...</ul>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyBU8V62nFLPBTJXyFVKH_w7uX7v4FFERXM",
            authDomain: "block-rush-online.firebaseapp.com",
            databaseURL: "https://block-rush-online-default-rtdb.firebaseio.com",
            projectId: "block-rush-online",
            storageBucket: "block-rush-online.firebasestorage.app",
            messagingSenderId: "374011309247",
            appId: "1:374011309247:web:f1be5d935c3ff99c5f2a0a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 遊戲邏輯變數 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const statusElement = document.getElementById('status');
        const speedMonitor = document.getElementById('speedMonitor');
        const leaderboardList = document.getElementById('leaderboard-list');

        canvas.width = 800;
        canvas.height = 200;

        const STATE = { WAITING: 0, PLAYING: 1, GAMEOVER: 2 };
        let currentState = STATE.WAITING;

        let score = 0;
        let timer = 0;
        let baseSpeed = 5;
        let gameSpeed = 5;
        let boostTimer = 0;
        const BOOST_MULT = 1.8;

        let obstacles = [];
        let birds = [];
        let items = [];

        const dino = {
            x: 50, y: 150, width: 40, height: 40,
            dy: 0, jumpForce: 10, gravity: 0.5, jumpCount: 0,
            draw() {
                ctx.fillStyle = boostTimer > 0 ? (timer % 10 < 5 ? '#f1c40f' : '#e67e22') : '#555';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            },
            update() {
                this.dy += this.gravity;
                this.y += this.dy;
                if (this.y + this.height >= canvas.height) {
                    this.y = canvas.height - this.height;
                    this.dy = 0;
                    this.jumpCount = 0;
                }
            },
            jump() {
                if (this.jumpCount < 2) {
                    this.dy = -this.jumpForce;
                    this.jumpCount++;
                }
            }
        };

        // --- 排行榜功能 ---
        async function updateLeaderboardUI() {
            const dbRef = query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(5));
            try {
                const snapshot = await get(dbRef);
                if (snapshot.exists()) {
                    const data = [];
                    snapshot.forEach((child) => { data.push(child.val()); });
                    data.reverse();
                    leaderboardList.innerHTML = data.map((item, index) => 
                        `<li><span>${index+1}. ${item.name}</span> <b>${item.score}</b></li>`
                    ).join('');
                } else {
                    leaderboardList.innerHTML = "<li>目前尚無排行</li>";
                }
            } catch (e) {
                leaderboardList.innerHTML = "<li>載入失敗</li>";
            }
        }

        async function submitScore(finalScore) {
            const name = prompt(`遊戲結束！您的得分是 ${finalScore}\n請輸入您的名稱以登錄排行榜:`, "玩家");
            if (name) {
                const userRef = ref(db, 'leaderboard/' + name);
                const snapshot = await get(userRef);
                // 只有比舊分數高才更新
                if (!snapshot.exists() || snapshot.val().score < finalScore) {
                    await set(userRef, {
                        name: name,
                        score: finalScore,
                        time: Date.now()
                    });
                    updateLeaderboardUI();
                }
            }
        }

        function resetGame() {
            score = 0; timer = 0; boostTimer = 0;
            baseSpeed = 5; gameSpeed = 5;
            obstacles = []; birds = []; items = [];
            dino.y = 150; dino.dy = 0; dino.jumpCount = 0;
            statusElement.innerText = "";
        }

        function handleLogic() {
            timer++;
            baseSpeed = 5 + (Math.floor(score / 200) * 0.5);

            if (boostTimer > 0) {
                boostTimer--;
                gameSpeed = baseSpeed * BOOST_MULT;
                statusElement.innerText = "⚡ 道具加速中！ (無視仙人掌) ⚡";
            } else {
                gameSpeed = baseSpeed; 
                statusElement.innerText = "";
            }

            speedMonitor.innerText = `正常速度: ${baseSpeed.toFixed(1)} | 當前速度: ${gameSpeed.toFixed(1)} ${boostTimer > 0 ? '(BOOST!)' : ''}`;

            if (timer % 100 === 0) obstacles.push({ x: 800, y: 160, width: 25, height: 40 });
            if (timer % 180 === 0) {
                birds.push({ 
                    x: 800, baseY: 80, width: 35, height: 15, 
                    offset: Math.random() * 10,
                    amp: 40 + Math.random() * 40,
                    freq: 0.1 + Math.random() * 0.05
                });
            }
            if (timer % 600 === 0) items.push({ x: 800, y: 60, width: 25, height: 25 });

            obstacles.forEach((ob, i) => {
                ob.x -= gameSpeed;
                ctx.fillStyle = '#27ae60';
                ctx.fillRect(ob.x, ob.y, ob.width, ob.height);
                if (checkCollision(dino, ob)) {
                    if (boostTimer > 0) { obstacles.splice(i, 1); score += 100; }
                    else endGame();
                }
            });

            birds.forEach((b, i) => {
                b.x -= (gameSpeed + 1);
                b.y = b.baseY + Math.sin(timer * b.freq + b.offset) * b.amp;
                ctx.fillStyle = '#8e44ad';
                ctx.fillRect(b.x, b.y, b.width, b.height);
                if (checkCollision(dino, b)) endGame();
            });

            items.forEach((it, i) => {
                it.x -= gameSpeed;
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath(); ctx.arc(it.x + 12, it.y + 12, 12, 0, Math.PI * 2); ctx.fill();
                if (checkCollision(dino, it)) { items.splice(i, 1); boostTimer = 300; }
            });

            obstacles = obstacles.filter(o => o.x > -50);
            birds = birds.filter(b => b.x > -50);
            items = items.filter(it => it.x > -50);

            score++;
            scoreElement.innerText = `分數: ${score}`;
        }

        function endGame() {
            currentState = STATE.GAMEOVER;
            submitScore(score);
        }

        function checkCollision(a, b) {
            return a.x < b.x + b.width && a.x + a.width > b.x &&
                   a.y < b.y + b.height && a.y + a.height > b.y;
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dino.draw();

            if (currentState === STATE.WAITING) {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "24px Arial";
                ctx.fillText("按下 [空白鍵] 開始遊戲", canvas.width / 2, canvas.height / 2 + 10);
            } else if (currentState === STATE.PLAYING) {
                dino.update();
                handleLogic();
            } else if (currentState === STATE.GAMEOVER) {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white"; ctx.textAlign = "center";
                ctx.font = "bold 30px Arial"; ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "20px Arial"; ctx.fillText(`最終得分: ${score} | 按下 [空白鍵] 重玩`, canvas.width / 2, canvas.height / 2 + 30);
            }
            requestAnimationFrame(animate);
        }

        function handleInput() {
            if (currentState !== STATE.PLAYING) {
                resetGame();
                currentState = STATE.PLAYING;
            } else {
                dino.jump();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); handleInput(); }
        });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); });

        // 啟動時先抓取一次排行榜
        updateLeaderboardUI();
        animate();
    </script>
</body>
</html>
